<style>
  .banner-container {
    position: relative;
    width: 100vw;
    height: 75vh;
    margin-left: calc(-50vw + 50%);
    margin-top: -2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
    overflow: hidden;
  }
  canvas#waveCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .logo-overlay {
    position: relative;
    z-index: 2;
    max-width: 45%;
    min-width: 280px;
    user-select: none;
    pointer-events: auto;
    transition: transform 0.3s ease;
  }
  .logo-overlay:hover {
    transform: scale(1.03);
  }
  .logo-overlay img {
    width: 100%;
    height: auto;
    display: block;
  }
  .content-section {
    max-width: 930px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
</style>

<div class="banner-container" id="banner">
  <canvas id="waveCanvas"></canvas>
  <div class="logo-overlay">
    <img src="{{ '/assets/img/unnamed (1).png' | relative_url }}" alt="WAVESLAB Logo">
  </div>
</div>

<div class="content-section">
  <hr class="my-5">
  <h3 class="text-2xl font-bold mb-4">Welcome to WAVESLAB</h3>
  <p class="text-gray-700 leading-relaxed">
    This is where your introductory text can be added! Non-coding lab members can easily add content here by typing regular paragraphs inside these paragraph tags.
  </p>
</div>

<script>
  const canvas = document.getElementById("waveCanvas");
  if (canvas) {
    const ctx = canvas.getContext("2d");
    const container = document.getElementById("banner");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = container.clientHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const mouse = {
      x: window.innerWidth / 2,
      y: container.clientHeight / 2,
      targetX: window.innerWidth / 2,
      targetY: container.clientHeight / 2,
    };

    container.addEventListener("mousemove", (e) => {
      const rect = container.getBoundingClientRect();
      mouse.targetX = e.clientX - rect.left;
      mouse.targetY = e.clientY - rect.top;
    });

    let increment = 0;
    const waveColors = [
      "rgba(15, 52, 96, 0.15)",
      "rgba(106, 27, 154, 0.1)",
      "rgba(230, 18, 70, 0.08)",
    ];

    function animate() {
      requestAnimationFrame(animate);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      mouse.x += (mouse.targetX - mouse.x) * 0.05;
      mouse.y += (mouse.targetY - mouse.y) * 0.05;

      waveColors.forEach((color, index) => {
        ctx.beginPath();
        const baseAmplitude = 60 + index * 20;
        const mouseInfluenceY = (1 - mouse.y / canvas.height) * 80;
        const amplitude = baseAmplitude + mouseInfluenceY;
        const frequency = 0.003 + index * 0.001 + mouse.x * 0.000005;

        ctx.moveTo(0, canvas.height / 2);

        for (let i = 0; i < canvas.width; i++) {
          const y =
            canvas.height / 2 +
            Math.sin(i * frequency + increment + index * 2) * amplitude;
          ctx.lineTo(i, y);
        }

        ctx.strokeStyle = color;
        ctx.lineWidth = 3 - index * 0.5;
        ctx.stroke();
      });

      increment += 0.015;
    }

    animate();
  }
</script>
